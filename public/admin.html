<!-- admin.html -->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin | Lena Dijksma</title>
    <meta name="robots" content="noindex, nofollow" />
    <link rel="shortcut icon" href="/images/logo.png" type="image/png">

    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.3.0/fonts/remixicon.css" rel="stylesheet" />

    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/admin.css" />

    <script>
        if (localStorage.getItem("theme") === "dark") {
            document.documentElement.classList.add("dark");
        }
    </script>
</head>

<body class="admin-body">
    <div class="background-glow"></div>

    <!-- ========================= -->
    <!-- LOGIN VIEW -->
    <!-- ========================= -->
    <main id="login-view" class="admin-login-view" hidden>
        <form id="login-form" class="admin-card admin-login-card">
            <img src="/images/logo.png" alt="Logo" class="admin-login-logo" />
            <h1>Admin</h1>
            <p class="admin-subtle">Enter the password to manage your projects.</p>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" autocomplete="current-password" required />
            </div>

            <button type="submit" class="primary-btn admin-full-btn" id="login-btn">
                <i class="ri-lock-unlock-line"></i>
                Sign in
            </button>

            <p id="login-error" class="admin-error" hidden></p>
        </form>
    </main>

    <!-- ========================= -->
    <!-- DASHBOARD VIEW -->
    <!-- ========================= -->
    <main id="dashboard-view" class="admin-dashboard-view" hidden>
        <header class="admin-header">
            <div class="admin-header-title">
                <img src="/images/logo.png" alt="Logo" class="admin-header-logo" />
                <div class="stacked">
                    <span>Projects</span>
                    <span class="stacked-btm">Admin</span>
                </div>
            </div>

            <div class="admin-header-actions">
                <a href="/" class="admin-icon-btn" title="View site" target="_blank" rel="noopener noreferrer">
                    <i class="ri-external-link-line"></i>
                </a>
                <button id="logout-btn" class="admin-icon-btn" title="Log out">
                    <i class="ri-logout-box-r-line"></i>
                </button>
            </div>
        </header>

        <div id="status-banner" class="admin-status-banner" hidden></div>

        <div class="admin-toolbar">
            <p class="admin-subtle" id="project-count">Loading projects…</p>
            <button id="add-project-btn" class="primary-btn">
                <i class="ri-add-line"></i>
                Add project
            </button>
        </div>

        <div id="projects-list" class="admin-projects-list"></div>
    </main>

    <!-- ========================= -->
    <!-- EDIT / ADD MODAL -->
    <!-- ========================= -->
    <div id="editor-overlay" class="admin-overlay" hidden>
        <form id="editor-form" class="admin-card admin-editor">
            <h2 id="editor-title">Edit project</h2>

            <div class="admin-editor-grid">
                <div class="form-group">
                    <label for="f-title">Title (category)</label>
                    <input type="text" id="f-title" required placeholder="e.g. Healthcare Website" />
                </div>

                <div class="form-group">
                    <label for="f-name">Name</label>
                    <input type="text" id="f-name" required placeholder="e.g. NerineZorg" />
                </div>
            </div>

            <div class="form-group">
                <label for="f-desc">Description</label>
                <textarea id="f-desc" rows="3" required></textarea>
            </div>

            <div class="admin-editor-grid">
                <div class="form-group">
                    <label for="f-link">Link</label>
                    <input type="text" id="f-link" required placeholder="https://... or /internal-path" />
                </div>

                <div class="form-group">
                    <label for="f-type">Type</label>
                    <input type="text" id="f-type" required placeholder="e.g. website, personal" />
                </div>
            </div>

            <div class="admin-editor-grid">
                <div class="form-group">
                    <label for="f-color">Accent color</label>
                    <div class="admin-color-row">
                        <input type="color" id="f-color-picker" value="#7f4bfb" />
                        <input type="text" id="f-color" required placeholder="#7f4bfb" />
                    </div>
                </div>

                <div class="form-group">
                    <label for="f-img">Image path</label>
                    <input type="text" id="f-img" placeholder="/images/example.webp" />
                </div>
            </div>

            <div class="form-group">
                <label for="f-tech">Tech (comma separated)</label>
                <input type="text" id="f-tech" placeholder="HTML, CSS, JavaScript" />
            </div>

            <label class="admin-checkbox-row">
                <input type="checkbox" id="f-public" />
                Public project (link opens externally, shown in the public grid)
            </label>

            <div class="admin-editor-actions">
                <button type="button" id="editor-cancel" class="admin-secondary-btn">Cancel</button>
                <button type="submit" class="primary-btn">
                    <i class="ri-check-line"></i>
                    Save project
                </button>
            </div>
        </form>
    </div>

    <!-- ========================= -->
    <!-- DELETE CONFIRM MODAL -->
    <!-- ========================= -->
    <div id="confirm-overlay" class="admin-overlay" hidden>
        <div class="admin-card admin-confirm">
            <h2>Delete this project?</h2>
            <p class="admin-subtle" id="confirm-text"></p>
            <div class="admin-editor-actions">
                <button type="button" id="confirm-cancel" class="admin-secondary-btn">Cancel</button>
                <button type="button" id="confirm-delete" class="admin-danger-btn">
                    <i class="ri-delete-bin-line"></i>
                    Delete
                </button>
            </div>
        </div>
    </div>

    <script src="js/admin.js"></script>
</body>

</html>
